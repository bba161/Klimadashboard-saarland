<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ist das Wetter heute normal? – Klimadashboard Saarland</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #ffffff;
    --muted: #6b6b6b;
    --line: #e3e0d8;
    --panel-bg: #f3f1ec;
    --accent: #d97b29;
    --accent-soft: #f6c878;
    --accent-dark: #b5601a;
    --ok: #3c7a4f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.45;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }

  h1 {
    font-size: 1.7rem;
    font-weight: 800;
    margin: 0 0 24px;
    letter-spacing: -0.01em;
  }

  .ort-auswahl {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px 16px;
    margin-bottom: 8px;
  }

  .ort-auswahl label {
    font-weight: 700;
    font-size: 0.95rem;
  }

  select {
    font-size: 1rem;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
    min-width: 220px;
  }

  .station-hinweis {
    font-size: 0.9rem;
    color: var(--muted);
    margin: 0 0 24px;
  }

  .station-hinweis strong {
    color: var(--ink);
  }

  .grid {
    display: grid;
    grid-template-columns: minmax(260px, 380px) 1fr;
    border: 1px solid var(--line);
  }

  @media (max-width: 760px) {
    .grid { grid-template-columns: 1fr; }
  }

  .kacheln {
    display: flex;
    flex-direction: column;
  }

  .kachel {
    display: flex;
    gap: 14px;
    padding: 22px 24px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--line);
  }

  .kachel:last-child { border-bottom: none; }

  .kachel .icon {
    flex: 0 0 auto;
    font-size: 1.4rem;
    line-height: 1;
    margin-top: 2px;
  }

  .kachel h2 {
    font-size: 0.95rem;
    margin: 0 0 4px;
    font-weight: 700;
  }

  .kachel p {
    margin: 0;
    font-size: 0.92rem;
    color: var(--muted);
  }

  .wert {
    font-weight: 700;
    color: var(--ink);
  }

  .einordnung {
    color: var(--accent-dark);
    font-weight: 600;
  }

  .einordnung.normal { color: var(--ok); }

  .chart-panel {
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
  }

  .chart-panel h2 {
    font-size: 1rem;
    margin: 0 0 4px;
  }

  .chart-panel .sub {
    font-size: 0.88rem;
    color: var(--muted);
    margin: 0 0 16px;
  }

  .chart-container {
    position: relative;
    flex: 1;
    min-height: 320px;
  }

  .referenz-toggle {
    display: inline-flex;
    border: 1px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 14px;
    align-self: flex-start;
  }

  .referenz-toggle button {
    border: none;
    background: var(--paper);
    color: var(--ink);
    padding: 7px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 600;
  }

  .referenz-toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }

  footer {
    margin-top: 18px;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: right;
  }

  footer a { color: var(--muted); }

  .stale-warnung {
    background: #fdf1e6;
    border: 1px solid var(--accent-soft);
    color: var(--accent-dark);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 18px;
    display: none;
  }

  .stale-warnung.sichtbar { display: block; }

  .lade-hinweis {
    padding: 40px;
    text-align: center;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Ist das Wetter heute normal?</h1>

  <div class="ort-auswahl">
    <label for="plz-select">Ihre Postleitzahl:</label>
    <select id="plz-select"></select>
  </div>
  <p class="station-hinweis" id="station-hinweis">Lade Stationsdaten…</p>

  <div class="stale-warnung" id="stale-warnung"></div>

  <div class="grid" id="dashboard-grid">
    <div class="lade-hinweis">Lade Klimadaten vom Deutschen Wetterdienst…</div>
  </div>

  <footer>
    Datenquelle: <a href="https://opendata.dwd.de" target="_blank" rel="noopener">Deutscher Wetterdienst (DWD) Open Data</a>
    · Stündlich aktualisiert · Stand: <span id="stand-zeit">–</span>
  </footer>
</div>

<script>
(function () {
  const DATA_URL = "data/saarland.json";
  const PLZ_MAPPING_URL = "data/plz_mapping.json";
  const SOMMERTAG_SCHWELLE = 25;

  let klimaData = null;
  let plzMapping = null;
  let chart = null;
  let aktuelleReferenz = "1991-2020";

  const $ = (id) => document.getElementById(id);

  async function ladeDaten() {
    const [klimaResp, plzResp] = await Promise.all([
      fetch(DATA_URL, { cache: "no-store" }),
      fetch(PLZ_MAPPING_URL, { cache: "no-store" }),
    ]);
    if (!klimaResp.ok) throw new Error("Klimadaten konnten nicht geladen werden (" + klimaResp.status + ")");
    if (!plzResp.ok) throw new Error("PLZ-Zuordnung konnte nicht geladen werden (" + plzResp.status + ")");
    klimaData = await klimaResp.json();
    plzMapping = await plzResp.json();
  }

  function pruefeAktualitaet() {
    const warnung = $("stale-warnung");
    if (!klimaData || !klimaData.generated_at) return;
    const generiert = new Date(klimaData.generated_at);
    const stundenAlt = (Date.now() - generiert.getTime()) / 36e5;
    if (stundenAlt > 36) {
      warnung.textContent =
        "Hinweis: Die Daten wurden zuletzt vor über " + Math.floor(stundenAlt) +
        " Stunden aktualisiert. Möglicherweise ist die automatische Aktualisierung gerade gestört. " +
        "Es werden die letzten verfügbaren Werte angezeigt.";
      warnung.classList.add("sichtbar");
    } else {
      warnung.classList.remove("sichtbar");
    }
    $("stand-zeit").textContent = generiert.toLocaleString("de-DE", {
      day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit",
    });
  }

  function befuelleOrtsAuswahl() {
    const select = $("plz-select");
    select.innerHTML = "";
    const plzListe = Object.entries(plzMapping.mapping)
      .sort((a, b) => a[0].localeCompare(b[0]));
    for (const [plz, info] of plzListe) {
      const opt = document.createElement("option");
      opt.value = plz;
      opt.textContent = plz + " – " + info.ort;
      select.appendChild(opt);
    }
    select.addEventListener("change", () => renderFuerPLZ(select.value));
  }

  function formatNum(value, digits = 0) {
    if (value === null || value === undefined || Number.isNaN(value)) return "–";
    return value.toLocaleString("de-DE", { minimumFractionDigits: digits, maximumFractionDigits: digits });
  }

  function einordnung(aktuell, mittel, einheit) {
    if (aktuell === null || aktuell === undefined || mittel === null || mittel === undefined) {
      return { text: "keine Einordnung möglich", klasse: "" };
    }
    const diff = aktuell - mittel;
    const relevanteSchwelle = einheit === "mm" ? mittel * 0.15 : 1.5;
    if (Math.abs(diff) <= relevanteSchwelle) {
      return { text: "im normalen Bereich", klasse: "normal" };
    }
    if (diff > 0) {
      return { text: einheit === "mm" ? "ungewöhnlich viel" : "ungewöhnlich warm", klasse: "" };
    }
    return { text: einheit === "mm" ? "ungewöhnlich wenig" : "ungewöhnlich kalt", klasse: "" };
  }

  function renderKacheln(station) {
    const ref = station.referenzperioden ? station.referenzperioden[aktuelleReferenz] : null;
    const grid = $("dashboard-grid");

    const tempHeute = station.tageshoechstwert_heute_c;
    const tempAktuell = station.aktuelle_temperatur ? station.aktuelle_temperatur.wert : null;
    const niederschlag30 = station.niederschlag_letzte_30_tage_mm;
    const niederschlagMittelJahr = ref ? ref.niederschlag_jahresmittel_mm : null;
    // Vereinfachter Vergleichswert für 30-Tage-Niederschlag: Jahresmittel / 12
    const niederschlagMittel30 = niederschlagMittelJahr !== null ? niederschlagMittelJahr / 12 : null;
    const sommertageBisher = station.sommertage_laufendes_jahr;
    const sommertageMittel = ref ? ref.sommertage_mittel : null;

    const tempEinordnung = einordnung(tempHeute, sommertageMittel !== null ? null : null, "c");
    const tempVergleich = einordnung(tempHeute, ref && ref.sommertage_mittel !== null ? null : null, "c");
    // Für die Temperatur nutzen wir als Referenz keinen direkten Mittelwert
    // (DWD liefert hier kein einfaches Tagesmittel pro Datum), daher zeigen
    // wir den Tageshöchstwert primär faktisch mit Sommertag-Einordnung an.

    const niederschlagUrteil = einordnung(niederschlag30, niederschlagMittel30, "mm");
    const aktuellTempText = tempAktuell !== null
      ? formatNum(tempAktuell, 1) + " °C"
      : (station.hourly_temp_distance_km
          ? "keine Live-Daten verfügbar (nächste Station " + station.hourly_temp_distance_km + " km entfernt)"
          : "keine Live-Daten verfügbar");

    grid.innerHTML = `
      <div class="kacheln">
        <div class="kachel">
          <div class="icon">🌡️</div>
          <div>
            <h2>Temperatur</h2>
            <p>
              Aktuell: <span class="wert">${aktuellTempText}</span><br>
              Tageshöchstwert heute: <span class="wert">${tempHeute !== null ? formatNum(tempHeute, 1) + " °C" : "–"}</span>
            </p>
          </div>
        </div>

        <div class="kachel">
          <div class="icon">🌧️</div>
          <div>
            <h2>Regen</h2>
            <p>
              Regen in den letzten 30 Tagen: <span class="wert">${niederschlag30 !== null ? formatNum(niederschlag30, 1) + " mm" : "–"}</span>.
              Das ist <span class="einordnung ${niederschlagUrteil.klasse}">${niederschlagUrteil.text}</span>
              ${niederschlagMittel30 !== null ? " (Vergleich: rund " + formatNum(niederschlagMittel30, 0) + " mm im Referenzzeitraum " + aktuelleReferenz + ")" : ""}.
            </p>
          </div>
        </div>

        <div class="kachel">
          <div class="icon">☀️</div>
          <div>
            <h2>Sommertage</h2>
            <p>
              Sommertage ab 25 °C: <span class="wert">${sommertageBisher !== null ? sommertageBisher : "–"}</span> seit Jahresbeginn.
              ${sommertageMittel !== null
                ? "Im Mittel " + formatNum(sommertageMittel, 1) + " pro Jahr (Referenz " + aktuelleReferenz + ")."
                : ""}
              Wie viele es am Ende des Jahres werden, schwankt von Jahr zu Jahr – der langfristige Trend zeigt aber nach oben.
            </p>
          </div>
        </div>
      </div>

      <div class="chart-panel">
        <h2>So viele Sommertage gab es in ${station.name} pro Jahr</h2>
        <p class="sub">Sommertag = Tageshöchsttemperatur von 25&nbsp;°C oder mehr. Balken zeigen die Jahressumme seit ${Object.keys(station.sommertage_pro_jahr)[0] || "–"}, die Linie den langjährigen Trend.</p>
        <div class="chart-container">
          <canvas id="sommertage-chart"></canvas>
        </div>
        <div class="referenz-toggle" id="referenz-toggle">
          <button data-ref="1961-1990" class="${aktuelleReferenz === "1961-1990" ? "active" : ""}">Referenz 1961–1990</button>
          <button data-ref="1991-2020" class="${aktuelleReferenz === "1991-2020" ? "active" : ""}">Referenz 1991–2020</button>
        </div>
      </div>
    `;

    document.querySelectorAll("#referenz-toggle button").forEach((btn) => {
      btn.addEventListener("click", () => {
        aktuelleReferenz = btn.dataset.ref;
        renderKacheln(station);
      });
    });

    zeichneChart(station);
  }

  function linearerTrend(jahre, werte) {
    const n = jahre.length;
    if (n < 2) return jahre.map(() => null);
    const meanX = jahre.reduce((a, b) => a + b, 0) / n;
    const meanY = werte.reduce((a, b) => a + b, 0) / n;
    let num = 0, den = 0;
    for (let i = 0; i < n; i++) {
      num += (jahre[i] - meanX) * (werte[i] - meanY);
      den += (jahre[i] - meanX) ** 2;
    }
    const steigung = den === 0 ? 0 : num / den;
    const achsenabschnitt = meanY - steigung * meanX;
    return jahre.map((j) => steigung * j + achsenabschnitt);
  }

  function zeichneChart(station) {
    const ctx = document.getElementById("sommertage-chart");
    const eintraege = Object.entries(station.sommertage_pro_jahr).sort((a, b) => Number(a[0]) - Number(b[0]));
    const jahre = eintraege.map(([j]) => Number(j));
    const werte = eintraege.map(([, w]) => w);
    const trend = linearerTrend(jahre, werte);

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      data: {
        labels: jahre,
        datasets: [
          {
            type: "bar",
            label: "Sommertage",
            data: werte,
            backgroundColor: "#f6c878",
            borderRadius: 2,
          },
          {
            type: "line",
            label: "Langjähriger Trend",
            data: trend,
            borderColor: "#4a4a4a",
            borderWidth: 2,
            pointRadius: 0,
            tension: 0,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (item) =>
                item.dataset.type === "bar"
                  ? item.parsed.y + " Sommertage"
                  : "Trend: " + item.parsed.y.toFixed(1),
            },
          },
        },
        scales: {
          x: { grid: { display: false } },
          y: { beginAtZero: true, title: { display: false } },
        },
      },
    });
  }

  function renderFuerPLZ(plz) {
    const eintrag = plzMapping.mapping[plz];
    if (!eintrag) {
      $("station-hinweis").textContent = "Für diese Postleitzahl liegt keine Stationszuordnung vor.";
      return;
    }
    const station = klimaData.stations[eintrag.station_id];
    if (!station || station.status === "error") {
      $("station-hinweis").innerHTML =
        "Nächstgelegene Station: <strong>" + eintrag.station_name + "</strong> – aktuell sind leider keine Daten verfügbar.";
      $("dashboard-grid").innerHTML = '<div class="lade-hinweis">Für diese Station liegen derzeit keine Daten vor.</div>';
      return;
    }

    $("station-hinweis").innerHTML =
      "Nächstgelegene Wetterstation: <strong>" + station.name + "</strong>" +
      " (ca. " + eintrag.distanz_km + " km entfernt)" +
      (station.status === "stale" ? " – <em>Achtung: letzte erfolgreiche Aktualisierung dieser Station liegt zurück.</em>" : "");

    renderKacheln(station);
  }

  async function init() {
    try {
      await ladeDaten();
      pruefeAktualitaet();
      befuelleOrtsAuswahl();
      const erstePLZ = Object.keys(plzMapping.mapping).sort()[0];
      if (erstePLZ) {
        $("plz-select").value = erstePLZ;
        renderFuerPLZ(erstePLZ);
      }
    } catch (err) {
      console.error(err);
      $("dashboard-grid").innerHTML =
        '<div class="lade-hinweis">Die Klimadaten konnten nicht geladen werden. Bitte später erneut versuchen.<br><small>' +
        (err && err.message ? err.message : "") + "</small></div>";
      $("station-hinweis").textContent = "";
    }
  }

  init();
})();
</script>
</body>
</html>
